<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 스터디 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #f4f6f8; --card: #ffffff; --pri: #333333; --brd: #e0e0e0; --profit: #ff4d4f; --loss: #1890ff; }
        html { height: 100%; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; height: 100%; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }

        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 100000; }
        .login-box { background: var(--card); padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 320px; box-sizing: border-box; }
        .login-box h2 { margin: 0 0 25px; color: var(--pri); font-size: 22px; }
        .login-box input { width: 100%; padding: 14px; border: 1px solid var(--brd); border-radius: 6px; margin-bottom: 20px; font-size: 16px; box-sizing: border-box; text-align: center; letter-spacing: 2px; }
        .login-box button { width: 100%; padding: 14px; background: var(--pri); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .login-box button:hover { background: #000; }
        
        #main-app { display: none; } 

        .container { max-width: 1200px; margin: 0 auto; padding: 15px; padding-bottom: 60px; box-sizing: border-box; }

        .top-info-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .version-tag { font-weight: 800; color: var(--pri); font-size: 14px; background: #eef2f5; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--brd); }
        .top-right-items { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        
        .exchange-info { font-size: 12px; color: #666; font-weight: bold; }
        .refresh-btn { background: #e0e0e0; border: none; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; font-weight: bold; color: #333; transition: 0.2s; }
        .refresh-btn:hover { background: #ccc; }

        .tabs { display: flex; border-bottom: 2px solid var(--brd); margin-bottom: 20px; overflow-x: auto; overflow-y: hidden; white-space: nowrap; -webkit-overflow-scrolling: touch; touch-action: pan-x; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: none; border: none; padding: 12px 20px; font-size: 16px; cursor: pointer; color: #666; font-weight: bold; flex-shrink: 0; }
        .tab-btn.active { color: var(--pri); border-bottom: 3px solid var(--pri); margin-bottom: -2px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; width: 100%; box-sizing: border-box; }
        .card h3 { margin-top: 0; border-bottom: 1px solid var(--brd); padding-bottom: 10px; font-size: 18px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--brd); padding-bottom: 10px; margin-bottom: 15px; }
        .card-header h3 { border: none; padding: 0; margin: 0; }
        
        .realized-badge { background: #fff3cd; color: #856404; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; border: 1px solid #ffeeba; }

        .idx-wrap { background: #1a1a1a; padding: 25px; border-radius: 12px; margin-bottom: 20px; color: white; }
        .idx-wrap h3 { border-color: #333; color: #eee; text-align: center; font-size: 15px; margin-bottom: 20px; font-weight: bold; }
        .idx-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .idx-item { text-align: center; padding: 10px; border-right: 1px solid #333; display: flex; flex-direction: column; justify-content: center; }
        .idx-item:last-child { border-right: none; }
        .idx-item .val { font-size: 20px; font-weight: 800; margin-bottom: 4px; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #fff; }
        .idx-item .pct { font-size: 13px; font-weight: bold; }
        .idx-item .key { font-size: 13px; color: #b0b0b0; font-weight: 500; }

        .metrics { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .m-box { flex: 1; min-width: 200px; background: var(--card); padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #ccc; }
        .m-box.gold { border-left-color: #ffd700; }
        .m-box.red  { border-left-color: var(--profit); }
        .m-box.blue { border-left-color: var(--loss); }
        .m-box h4 { margin: 0 0 10px 0; font-size: 13px; color: #666; }
        .m-box p { margin: 0; font-size: 22px; font-weight: bold; }

        .tbl-wrap { width: 100%; overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; touch-action: pan-x; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th, td { padding: 12px 10px; border-bottom: 1px solid var(--brd); text-align: right; font-size: 14px; white-space: nowrap; }
        th { background: #f9fafc; color: #555; font-size: 13px; cursor: pointer; user-select: none; transition: background 0.2s; }
        th:hover { background: #eef2f5; }
        th:first-child, td:first-child { text-align: left; }
        
        .price-up { animation: flash-up 1s ease-out; }
        .price-down { animation: flash-down 1s ease-out; }
        @keyframes flash-up { 0% { background-color: rgba(255, 77, 79, 0.2); } 100% { background-color: transparent; } }
        @keyframes flash-down { 0% { background-color: rgba(24, 144, 255, 0.2); } 100% { background-color: transparent; } }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; align-items: end; }
        .f-grp { display: flex; flex-direction: column; font-size: 12px; }
        .f-grp label { margin-bottom: 4px; color: #555; }
        .f-grp input, .f-grp select, .f-grp textarea { padding: 8px; border: 1px solid var(--brd); border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        input[disabled], select[disabled] { background-color: #eaecf0; cursor: not-allowed; color: #555; font-weight: bold; border: 1px solid #ccc; }

        .filter-bar { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; background: #f9fafc; padding: 10px; border-radius: 8px; border: 1px solid var(--brd); }
        .filter-bar input, .filter-bar select { padding: 8px; border: 1px solid var(--brd); border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        .filter-label { font-size: 13px; font-weight: bold; color: #555; margin-right: 5px; }

        .btn-grp { display: flex; gap: 8px; }
        button { cursor: pointer; font-weight: bold; transition: 0.2s; border: none; border-radius: 6px; }
        .p-btn { flex: 1; padding: 10px; background: var(--pri); color: white; }
        .c-btn { flex: 1; padding: 10px; background: #6c757d; color: white; display: none; }
        .a-btn { padding: 6px 10px; font-size: 12px; margin-left: 4px; color: white; border-radius: 4px; }
        .edit-btn { background: #f1c40f; color: #333; }
        .del-btn  { background: #e74c3c; }

        .chart { height: 350px; width: 100%; max-width: 600px; margin: 0 auto; }
        .profit { color: var(--profit); font-weight: bold; }
        .loss   { color: var(--loss);   font-weight: bold; }

        /* 타임라인 스타일 */
        .op-item { background: #f9fafc; padding: 15px; border-radius: 8px; border-left: 4px solid var(--pri); margin-bottom: 15px; }
        .op-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; color: #666; align-items: center; }
        .op-author { font-weight: bold; color: var(--pri); font-size: 14px; }
        .op-content { font-size: 14px; line-height: 1.5; white-space: pre-wrap; color: #333; }
        .op-del { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 12px; padding: 0; }
        .op-del:hover { text-decoration: underline; background: none; }

        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; font-weight: bold; flex-direction: column; gap: 15px; }
        .spin { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--pri); border-radius: 50%; animation: sp 1s linear infinite; }
        @keyframes sp { 100% { transform: rotate(360deg); } }

        #del-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; justify-content: center; align-items: center; }
        #del-modal.open { display: flex; }
        .del-modal-box { background: white; border-radius: 16px; padding: 30px 24px 20px; max-width: 320px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .del-modal-box .icon { font-size: 40px; margin-bottom: 12px; }
        .del-modal-box h4 { margin: 0 0 8px; font-size: 17px; }
        .del-modal-box p  { margin: 0 0 24px; font-size: 14px; color: #666; }
        .del-modal-btns { display: flex; gap: 10px; }
        .del-modal-btns button { flex: 1; padding: 12px; border-radius: 8px; font-size: 15px; }
        #del-confirm-btn { background: #e74c3c; color: white; }
        #del-cancel-btn  { background: #f0f0f0; color: #333; }

        @media (max-width: 600px) {
            .container { padding: 10px; }
            .card { padding: 14px; }
            .idx-grid { grid-template-columns: repeat(2, 1fr); }
            .idx-item { border-right: none; border-bottom: 1px solid #333; }
            .idx-item:nth-child(odd) { border-right: 1px solid #333; }
            .idx-item:last-child { border-bottom: none; }
            .m-box { min-width: 100%; }
            .form-grid { grid-template-columns: 1fr 1fr; }
            .btn-grp { grid-column: span 2; }
            .idx-item .val { font-size: 16px; }
            th, td { padding: 9px 7px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>대시보드 로그인</h2>
        <input type="password" id="pwd-input" placeholder="비밀번호 입력">
        <button id="login-btn">입장하기</button>
    </div>
</div>

<div id="main-app">
    <div id="loader"><div class="spin"></div><div id="loader-txt">처리 중...</div></div>

    <div id="del-modal">
        <div class="del-modal-box">
            <div class="icon">🗑️</div>
            <h4>데이터 삭제</h4>
            <p>해당 기록을 영구적으로 삭제합니다.<br>이 작업은 되돌릴 수 없습니다.</p>
            <div class="del-modal-btns">
                <button id="del-cancel-btn" onclick="closeDelModal()">취소</button>
                <button id="del-confirm-btn">삭제</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="top-info-bar">
            <div class="version-tag">V1.4</div>
            <div class="top-right-items">
                <div class="exchange-info" id="last-update-display">서버 데이터 대기 중...</div>
                <div class="exchange-info" id="exchange-rate-display">적용 환율: 로딩 중...</div>
                <button class="refresh-btn" onclick="manualRefreshPrices()">🔄 DB 동기화 확인</button>
            </div>
        </div>

        <div class="tabs" id="tab-menu">
            <button class="tab-btn active" onclick="switchTab('dashboard', this)">통합 뷰</button>
            <button class="tab-btn" onclick="switchTab('opinions', this)">개인별 의견 (공유)</button>
            <button class="tab-btn" onclick="switchTab('u-김태호', this)">김태호</button>
            <button class="tab-btn" onclick="switchTab('u-이용우', this)">이용우</button>
            <button class="tab-btn" onclick="switchTab('u-이형주', this)">이형주</button>
        </div>

        <div id="dashboard" class="tab-content active">
            <div class="idx-wrap">
                <h3>글로벌 마켓 실시간 지표</h3>
                <div class="idx-grid" id="market-indices">
                    <div class="idx-loading">지표 대기 중...</div>
                </div>
            </div>
            <div class="metrics">
                <div class="m-box gold"><h4>오늘의 수익 왕</h4><p id="dash-top">-</p></div>
                <div class="m-box red"><h4>일일 최대 상승 주식</h4><p id="dash-best" class="profit">-</p></div>
                <div class="m-box blue"><h4>일일 최대 하락 주식</h4><p id="dash-worst" class="loss">-</p></div>
            </div>
            <div class="card">
                <h3>인원별 오버뷰 (원화 환산)</h3>
                <div class="tbl-wrap">
                    <table>
                        <thead><tr><th>이름</th><th>투자 원금</th><th>현재 평가액</th><th>미실현 수익</th><th>실현 수익</th><th>총 수익률</th></tr></thead>
                        <tbody id="dash-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="opinions" class="tab-content">
            <div class="card">
                <h3>의견 및 매매 기록 공유</h3>
                <div class="form-grid" style="grid-template-columns: 1fr;">
                    <div class="f-grp" style="max-width: 200px;">
                        <label>작성자</label>
                        <select id="op-user">
                            <option value="김태호">김태호</option>
                            <option value="이용우">이용우</option>
                            <option value="이형주">이형주</option>
                        </select>
                    </div>
                    <div class="f-grp">
                        <label>내용 (시장 방향성, 관심 종목, 매매 이유 등)</label>
                        <textarea id="op-text" rows="4" placeholder="자유롭게 의견을 작성해 주세요..."></textarea>
                    </div>
                    <div class="btn-grp" style="max-width: 200px;">
                        <button class="p-btn" onclick="saveOpinion()">의견 등록</button>
                    </div>
                </div>
            </div>
            <div class="card">
                <h3>타임라인</h3>
                <div id="opinions-timeline" style="display:flex; flex-direction:column;">
                    <div class="idx-loading">의견을 불러오는 중...</div>
                </div>
            </div>
        </div>
        
        <div id="pages-container"></div>
    </div>
</div>

<script>
    window.checkPwd = function() {
        const pwd = document.getElementById('pwd-input').value;
        if (pwd === 'richguys') {
            sessionStorage.setItem('isLogged', 'true');
            startApp();
        } else {
            alert('비밀번호가 올바르지 않습니다.');
        }
    };

    document.getElementById('pwd-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkPwd();
    });
    document.getElementById('login-btn').addEventListener('click', checkPwd);

    const users = ['김태호', '이용우', '이형주'];
    let exKRW = 1350; 
    let previousPrices = {}; 
    const sortStates = {};
    users.forEach(u => sortStates[u] = { key: 'vKw', asc: false }); 

    const tMap = {
        'AAPL':'Apple', 'MSFT':'Microsoft', 'TSLA':'Tesla', 'NVDA':'NVIDIA',
        'GOOGL':'Alphabet', 'AMZN':'Amazon', 'META':'Meta', 'BRK-B':'Berkshire Hathaway',
        '005930':'삼성전자', '000660':'SK하이닉스', '373220':'LG에너지솔루션',
        '207940':'삼성바이오로직스', '005380':'현대차', '035420':'NAVER', '035720':'카카오'
    };

    const mSym = {
        'KRW=X': '원달러환율', '^IXIC': '나스닥', '^GSPC': 'S&P 500', 
        '^KS11': 'KOSPI', '^KQ11': '코스닥', '^VIX': 'VIX', 'CL=F': 'WTI 유가'
    };
    let cache = {};
    const state = { trades: {}, opinions: [], charts: {} };
    users.forEach(u => state.trades[u] = []);

    function safeKey(key) {
        return key.replace(/[.#$\[\]]/g, '_');
    }

    const firebaseConfig = {
        apiKey: "AIzaSyBjOprcJi0CotYmYDfWKoXsFtP3FTLnH-s",
        authDomain: "howooju.firebaseapp.com",
        databaseURL: "https://howooju-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "howooju",
        storageBucket: "howooju.firebasestorage.app",
        messagingSenderId: "252732591437",
        appId: "1:252732591437:web:961c790c34b8269cb7bb04",
        measurementId: "G-3GEWPQ2G00"
    };

    let db = null;

    window.onload = () => {
        if (sessionStorage.getItem('isLogged') === 'true') {
            startApp();
        }
    };

    function startApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';

        try {
            if (typeof firebase !== 'undefined' && !firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
            } else if (typeof firebase !== 'undefined' && firebase.apps.length) {
                db = firebase.database();
            }
        } catch (e) { console.error("Firebase 초기화 에러:", e); }

        initUI(); 
        
        if (db) {
            db.ref('trades').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                users.forEach(u => state.trades[u] = []);
                Object.keys(data).forEach(key => {
                    const t = data[key];
                    t.id = key;
                    if(state.trades[t.user]) state.trades[t.user].push(t);
                });
                updateAll();
            });

            db.ref('opinions').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                state.opinions = [];
                Object.keys(data).forEach(key => {
                    const op = data[key];
                    op.id = key;
                    state.opinions.push(op);
                });
                renderOpinions();
            });

            // 프론트엔드에서는 읽기만 수행 (데이터 갱신은 구글 Apps Script 서버에서 처리)
            db.ref('marketData').on('value', (snapshot) => {
                const data = snapshot.val();
                if(data && data.cache) {
                    exKRW = data.exKRW || 1350;
                    Object.assign(cache, data.cache || {});
                    
                    if (data.lastUpdated) {
                        const d = new Date(data.lastUpdated);
                        document.getElementById('last-update-display').innerText = `서버 최종 갱신: ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
                    }
                    document.getElementById('exchange-rate-display').innerText = `적용 환율: 1 USD = ${exKRW.toLocaleString(undefined, {maximumFractionDigits: 2})} KRW`;
                    
                    renderIdx();
                    updateAll();
                } else {
                    document.getElementById('last-update-display').innerText = "서버에서 데이터 긁어오는 중...";
                }
            });
        }
    }

    function toggleLd(show, txt = "처리 중...") {
        const loader = document.getElementById('loader');
        const loaderTxt = document.getElementById('loader-txt');
        if(loaderTxt) loaderTxt.innerText = txt;
        if(loader) loader.style.display = show ? 'flex' : 'none';
    }

    // 갱신 버튼 클릭 시 강제 호출 방지 (서버가 알아서 하도록 유도)
    function manualRefreshPrices() {
        if (!db) return;
        toggleLd(true, "Firebase DB와 동기화 확인 중...");
        db.ref('marketData').once('value').then(snapshot => {
            const data = snapshot.val();
            if (data && data.cache) {
                exKRW = data.exKRW || 1350;
                Object.assign(cache, data.cache || {});
                renderIdx();
                updateAll();
            }
            toggleLd(false);
            alert("서버의 최신 데이터 상태입니다.\n실제 시세 갱신은 백그라운드 서버(Apps Script)에서 15분마다 진행됩니다.");
        }).catch(e => {
            toggleLd(false);
        });
    }

    let pendingDelete = null;
    function openDelModal(id, mode = 'trade') { 
        pendingDelete = { id, mode }; 
        document.getElementById('del-modal').classList.add('open'); 
    }
    function closeDelModal() { 
        pendingDelete = null; 
        document.getElementById('del-modal').classList.remove('open'); 
    }
    
    document.getElementById('del-confirm-btn').addEventListener('click', async function() {
        if (!pendingDelete || !db) return;
        const { id, mode } = pendingDelete;
        const node = mode === 'opinion' ? 'opinions' : 'trades';
        closeDelModal();
        toggleLd(true, "삭제 중...");
        try { await db.ref(`${node}/${id}`).remove(); } catch(e) { alert("삭제 실패"); }
        toggleLd(false);
    });
    document.getElementById('del-modal').addEventListener('click', function(e) { if (e.target === this) closeDelModal(); });

    function getSortArrow(u, key) {
        if (sortStates[u].key !== key) return '↕';
        return sortStates[u].asc ? '▲' : '▼';
    }

    function sortPort(u, key) {
        if (sortStates[u].key === key) sortStates[u].asc = !sortStates[u].asc;
        else { sortStates[u].key = key; sortStates[u].asc = (key === 'fn') ? true : false; }
        updateAll();
    }

    function initUI() {

    function switchTab(targetId, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        const targetEl = document.getElementById(targetId);
        if (targetEl) targetEl.classList.add('active');
        if (btn) btn.classList.add('active');
    }

    async function saveOpinion() {
        if (!db) return alert("DB 미연결");
        const user = document.getElementById('op-user').value;
        const text = document.getElementById('op-text').value.trim();
        
        if (!text) return alert("내용을 입력해 주세요.");

        toggleLd(true, "의견 등록 중...");
        try {
            await db.ref('opinions').push({
                user: user,
                text: text,
                timestamp: Date.now()
            });
            document.getElementById('op-text').value = '';
        } catch(e) { alert("등록 실패"); }
        toggleLd(false);
    }

    function renderOpinions() {
        const container = document.getElementById('opinions-timeline');
        if (!container) return;
        
        const arr = [...state.opinions].sort((a,b) => b.timestamp - a.timestamp);
        
        if (arr.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#aaa; padding:20px;">아직 등록된 의견이 없습니다.</div>';
            return;
        }

        container.innerHTML = arr.map(op => {
            const d = new Date(op.timestamp);
            const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            return `
                <div class="op-item">
                    <div class="op-header">
                        <span class="op-author">${op.user}</span>
                        <div>
                            <span>${dateStr}</span>
                            <button class="op-del" style="margin-left:10px;" onclick="openDelModal('${op.id}', 'opinion')">삭제</button>
                        </div>
                    </div>
                    <div class="op-content">${op.text}</div>
                </div>
            `;
        }).join('');
    }

    async function saveTr(u) {
        if (!db) return alert("데이터베이스에 연결되지 않았습니다.");
        
        const eid = document.getElementById(`eid-${u}`).value;
        const tk  = document.getElementById(`tk-${u}`).value.toUpperCase();
        const data = {
            user:     u,
            date:     document.getElementById(`dt-${u}`).value,
            ticker:   tk,
            name:     document.getElementById(`nm-${u}`).value || tk,
            type:     document.getElementById(`ty-${u}`).value,
            currency: document.getElementById(`cr-${u}`).value,
            price:    parseFloat(document.getElementById(`pr-${u}`).value),
            qty:      parseFloat(document.getElementById(`qt-${u}`).value)
        };
        if (!data.ticker || isNaN(data.price) || isNaN(data.qty)) return alert("입력값을 확인해 주세요.");

        toggleLd(true, "저장 중...");
        try {
            if (eid) await db.ref(`trades/${eid}`).update(data);
            else await db.ref('trades').push(data);
            cancelEd(u);
        } catch(e) { alert("저장 실패: " + e.message); }
        toggleLd(false);
    }

    function editTr(u, id) {
        const tr = state.trades[u].find(t => String(t.id) === String(id));
        if (!tr) return;
        document.getElementById(`eid-${u}`).value  = tr.id;
        document.getElementById(`dt-${u}`).value   = tr.date;
        document.getElementById(`tk-${u}`).value   = tr.ticker;
        document.getElementById(`nm-${u}`).value   = tr.name;
        document.getElementById(`ty-${u}`).value   = tr.type;
        document.getElementById(`cr-${u}`).value   = tr.currency;
        document.getElementById(`pr-${u}`).value   = tr.price;
        document.getElementById(`qt-${u}`).value   = tr.qty;
        document.getElementById(`btn-${u}`).innerText = "수정 완료";
        document.getElementById(`cbtn-${u}`).style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEd(u) {
        document.getElementById(`eid-${u}`).value = "";
        ['tk','nm','pr','qt'].forEach(id => {
            const el = document.getElementById(`${id}-${u}`);
            if(el) el.value = '';
        });
        document.getElementById(`dt-${u}`).value = new Date().toISOString().substring(0, 10);
        document.getElementById(`btn-${u}`).innerText = "저장";
        document.getElementById(`cbtn-${u}`).style.display = "none";
    }

    function renderIdx() {
        const grid = document.getElementById('market-indices');
        if(!grid) return;
        const html = Object.entries(mSym).map(([sym, lbl]) => {
            const fbKey = safeKey(sym);
            const info = cache[fbKey];
            let priceStr = '-';
            let changeHtml = '<span class="pct" style="color:#aaa">데이터 없음</span>';

            if (info && info.price > 0) {
                priceStr = info.price.toLocaleString(undefined, { maximumFractionDigits: 2 });
                const pct = info.change;
                const cls  = pct > 0 ? 'profit' : (pct < 0 ? 'loss' : '');
                const sign = pct > 0 ? '+' : '';
                changeHtml = `<span class="pct ${cls}">(${sign}${pct.toFixed(2)}%)</span>`;
            }
            return `<div class="idx-item"><div class="val">${priceStr} ${changeHtml}</div><div class="key">${lbl}</div></div>`;
        }).join('');
        grid.innerHTML = html;
    }

    // 폼 입력 시 실시간 조회 기능 (저장 X)
    async function handleTk(u) {
        const tkIn = document.getElementById(`tk-${u}`);
        const nmIn = document.getElementById(`nm-${u}`);
        const prIn = document.getElementById(`pr-${u}`);
        const crSel = document.getElementById(`cr-${u}`);

        const tk = tkIn.value.trim().toUpperCase();
        if (!tk) { nmIn.value = ''; return; }

        tkIn.value = tk;
        const isKorean = /^\d{6}$/.test(tk);
        const fbKey = safeKey(tk);
        const instantName = tMap[tk] || (cache[fbKey] ? cache[fbKey].name : "");
        
        crSel.value = isKorean ? 'KRW' : 'USD';
        
        if (instantName) {
            nmIn.value = instantName;
        } else {
            nmIn.value = "";
            nmIn.placeholder = "API 검색 중...";
        }

        // 보조 조회
        try {
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${isKorean ? tk+'.KS' : tk}?interval=1d`)}`;
            const res = await fetch(proxyUrl);
            const data = await res.json();
            const meta = data.chart.result[0].meta;
            if (!nmIn.value) nmIn.value = meta.shortName || meta.longName || tk;
            if (meta.regularMarketPrice > 0 && !prIn.value) prIn.value = meta.regularMarketPrice;
        } catch(e) {
            if (!nmIn.value) nmIn.placeholder = "직접 입력";
        }
    }

    function updateAll() {
        try {
            let stats = [], hlds = [];
            let allDailyChanges = [];

            for (const u of users) {
                let port = {}, real = 0, tInv = 0, tVal = 0, cLbl = [], cDat = [];
                let portArray = [];

                state.trades[u].sort((a,b) => new Date(a.date)-new Date(b.date)).forEach(t => {
                    if (!port[t.ticker]) port[t.ticker] = { n: t.name, q: 0, c: 0, cr: t.currency };
                    let p = port[t.ticker];
                    if (t.type === 'buy') {
                        const totalQty = p.q + t.qty;
                        p.c = totalQty > 0 ? (p.q*p.c + t.qty*t.price) / totalQty : 0;
                        p.q += t.qty;
                    } else {
                        real += (t.price - p.c) * t.qty * (t.currency==='USD' ? exKRW : 1);
                        p.q  -= t.qty;
                    }
                });

                const rpSpan = document.getElementById(`rp-${u}`);
                if(rpSpan) {
                    rpSpan.innerText = real.toLocaleString('ko-KR', {maximumFractionDigits: 0});
                    rpSpan.className = real > 0 ? 'profit' : (real < 0 ? 'loss' : '');
                }

                for (const [tk, p] of Object.entries(port)) {
                    if (p.q <= 0) continue;
                    const fbKey = safeKey(tk);
                    const info  = cache[fbKey] || { price: 0, name: p.n, change: 0 };
                    const xr    = p.cr === 'USD' ? exKRW : 1;

                    const iKw = p.q * p.c * xr;
                    const isLoaded = info.price > 0;
                    const curPr = isLoaded ? info.price : p.c; 
                    const vKw = isLoaded ? (p.q * curPr * xr) : iKw;
                    
                    tInv += iKw; 
                    tVal += vKw;

                    const ret  = isLoaded && iKw > 0 ? ((vKw - iKw)/iKw)*100 : 0;
                    const profitAmt = vKw - iKw; 

                    portArray.push({
                        tk: tk, fn: info.name || p.n || tk, q: p.q, c: p.c, curPr: curPr,
                        vKw: vKw, ret: ret, profitAmt: profitAmt, isLoaded: isLoaded, sym: p.cr === 'USD' ? '$' : '₩'
                    });

                    if (isLoaded) {
                        allDailyChanges.push({ n: info.name || p.n || tk, change: Number(info.change || 0) });
                    }
                }

                const s = sortStates[u];
                portArray.sort((a, b) => {
                    let valA = a[s.key] ?? '';
                    let valB = b[s.key] ?? '';
                    if (typeof valA === 'string') return s.asc ? String(valA).localeCompare(String(valB)) : String(valB).localeCompare(String(valA));
                    return s.asc ? (Number(valA) - Number(valB)) : (Number(valB) - Number(valA));
                });

                const theadEl = document.getElementById(`thead-${u}`);
                if (theadEl) {
                    theadEl.innerHTML = `<tr>
                        <th onclick="sortPort('${u}', 'fn')">종목 ${getSortArrow(u, 'fn')}</th>
                        <th onclick="sortPort('${u}', 'q')">수량 ${getSortArrow(u, 'q')}</th>
                        <th onclick="sortPort('${u}', 'c')">평단가 ${getSortArrow(u, 'c')}</th>
                        <th onclick="sortPort('${u}', 'curPr')">현재가 ${getSortArrow(u, 'curPr')}</th>
                        <th onclick="sortPort('${u}', 'vKw')">평가액 (수익금) ${getSortArrow(u, 'vKw')}</th>
                        <th onclick="sortPort('${u}', 'ret')">수익률 ${getSortArrow(u, 'ret')}</th>
                    </tr>`;
                }

                let ptHtml = '';
                portArray.forEach(item => {
                    const cls  = item.isLoaded ? (item.ret > 0 ? 'profit' : (item.ret < 0 ? 'loss' : '')) : '';
                    const sign = item.isLoaded && item.ret > 0 ? '+' : '';
                    const displayCurPr = item.isLoaded ? `${item.sym}${item.curPr.toLocaleString(undefined,{maximumFractionDigits:2})}` : `<span style="color:#aaa;font-size:12px;">데이터 없음</span>`;
                    const displayRet = item.isLoaded ? `${sign}${item.ret.toFixed(2)}%` : `<span style="color:#aaa;">-</span>`;
                    
                    const pSign = item.profitAmt > 0 ? '+' : '';
                    const pCls = item.profitAmt > 0 ? 'profit' : (item.profitAmt < 0 ? 'loss' : '');
                    const profitStr = item.isLoaded ? `<span class="${pCls}">(${pSign}₩${Math.abs(item.profitAmt).toLocaleString('ko-KR',{maximumFractionDigits:0})})</span>` : '';

                    ptHtml += `<tr>
                        <td>${item.fn}<br><small style="color:#888">${item.tk}</small></td>
                        <td>${item.q.toLocaleString(undefined,{maximumFractionDigits:4})}</td>
                        <td>${item.sym}${item.c.toLocaleString(undefined,{maximumFractionDigits:2})}</td>
                        <td>${displayCurPr}</td>
                        <td>₩${item.vKw.toLocaleString('ko-KR',{maximumFractionDigits:0})} <br><small>${profitStr}</small></td>
                        <td class="${cls}">${displayRet}</td>
                    </tr>`;

                    cLbl.push(item.fn); cDat.push(item.vKw); 
                });

                const portTbody = document.getElementById(`port-${u}`);
                if(portTbody) portTbody.innerHTML = ptHtml || '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:20px">종목 없음</td></tr>';

                let logArr = [...state.trades[u]].sort((a,b) => new Date(b.date)-new Date(a.date));
                const fDtS = document.getElementById(`f-dt-s-${u}`) ? document.getElementById(`f-dt-s-${u}`).value : '';
                const fDtE = document.getElementById(`f-dt-e-${u}`) ? document.getElementById(`f-dt-e-${u}`).value : '';
                const fTxt = document.getElementById(`f-txt-${u}`) ? document.getElementById(`f-txt-${u}`).value.toLowerCase() : '';
                const fTy = document.getElementById(`f-ty-${u}`) ? document.getElementById(`f-ty-${u}`).value : 'all';

                logArr = logArr.filter(t => {
                    if (fDtS && t.date < fDtS) return false;
                    if (fDtE && t.date > fDtE) return false;
                    if (fTy !== 'all' && t.type !== fTy) return false;
                    if (fTxt && !t.name.toLowerCase().includes(fTxt) && !t.ticker.toLowerCase().includes(fTxt)) return false;
                    return true;
                });

                const logTbody = document.getElementById(`log-${u}`);
                if(logTbody) {
                    logTbody.innerHTML = logArr.map(t => {
                        const sym      = t.currency === 'USD' ? '$' : '₩';
                        const typeCls  = t.type === 'buy' ? 'loss' : 'profit';
                        const typeName = t.type === 'buy' ? '매수' : '매도';
                        return `<tr>
                            <td>${t.date}</td>
                            <td>${t.name}</td>
                            <td class="${typeCls}">${typeName}</td>
                            <td>${sym}${t.price.toLocaleString(undefined,{maximumFractionDigits:2})}</td>
                            <td>${t.qty}</td>
                            <td>
                                <button class="a-btn edit-btn" data-u="${u}" data-id="${t.id}" onclick="editTr(this.dataset.u, this.dataset.id)">수정</button>
                                <button class="a-btn del-btn"  onclick="openDelModal('${t.id}', 'trade')">삭제</button>
                            </td>
                        </tr>`;
                    }).join('') || '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:20px">내역 없음</td></tr>';
                }

                try {
                    const ctxEl = document.getElementById(`ch-${u}`);
                    if(ctxEl && typeof Chart !== 'undefined') {
                        if (state.charts[u]) state.charts[u].destroy();
                        
                        // 데이터가 없으면 차트 렌더링 스킵 (에러 방지)
                        if (cDat.length > 0 && cDat.some(val => val > 0)) {
                            state.charts[u] = new Chart(ctxEl.getContext('2d'), {
                                type: 'doughnut',
                                data: { labels: cLbl, datasets: [{ data: cDat, backgroundColor: ['#4e79a7','#f28e2c','#e15759','#76b7b2','#59a14f','#edc949'], borderWidth: 0 }] },
                                options: { maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12 } } } }
                            });
                        }
                    }
                } catch(e) { console.error("차트 에러:", e); }

                const ur = tVal - tInv;
                const rp = tInv > 0 ? (ur/tInv)*100 : 0;
                stats.push({ u, i: tInv, v: tVal, ur, r: real, rp });
            }

            const dashBody = document.getElementById('dash-body');
            if(dashBody) {
                dashBody.innerHTML = stats.map(s => {
                    const urCls = s.ur > 0 ? 'profit' : (s.ur < 0 ? 'loss' : '');
                    const rCls  = s.r  > 0 ? 'profit' : (s.r  < 0 ? 'loss' : '');
                    const rpCls = s.rp > 0 ? 'profit' : (s.rp < 0 ? 'loss' : '');
                    return `<tr>
                        <td><strong>${s.u}</strong></td>
                        <td>₩${s.i.toLocaleString('ko-KR',{maximumFractionDigits:0})}</td>
                        <td>₩${s.v.toLocaleString('ko-KR',{maximumFractionDigits:0})}</td>
                        <td class="${urCls}">₩${s.ur.toLocaleString('ko-KR',{maximumFractionDigits:0})}</td>
                        <td class="${rCls}">₩${s.r.toLocaleString('ko-KR',{maximumFractionDigits:0})}</td>
                        <td class="${rpCls}">${s.rp>0?'+':''}${s.rp.toFixed(2)}%</td>
                    </tr>`;
                }).join('');
            }

            const win = [...stats].sort((a,b) => b.rp - a.rp)[0];
            const dashTop = document.getElementById('dash-top');
            if(dashTop) dashTop.innerText = win && win.i > 0 ? `${win.u} (${win.rp>0?'+':''}${win.rp.toFixed(2)}%)` : '-';

            const dashBest = document.getElementById('dash-best');
            const dashWorst = document.getElementById('dash-worst');
            
            if (allDailyChanges.length > 0) {
                const b = allDailyChanges.reduce((p,c) => p.change > c.change ? p : c, allDailyChanges[0]);
                const w = allDailyChanges.reduce((p,c) => p.change < c.change ? p : c, allDailyChanges[0]);
                
                if(dashBest) {
                    dashBest.innerText = `${b.n} (${b.change > 0 ? '+' : ''}${b.change.toFixed(2)}%)`;
                    dashBest.className = b.change > 0 ? 'profit' : (b.change < 0 ? 'loss' : '');
                }
                if(dashWorst) {
                    dashWorst.innerText = `${w.n} (${w.change > 0 ? '+' : ''}${w.change.toFixed(2)}%)`;
                    dashWorst.className = w.change > 0 ? 'profit' : (w.change < 0 ? 'loss' : '');
                }
            } else {
                if(dashBest) { dashBest.innerText = '-'; dashBest.className = ''; }
                if(dashWorst) { dashWorst.innerText = '-'; dashWorst.className = ''; }
            }
            
        } catch (error) {
            console.error("데이터 렌더링 중 오류 발생:", error);
        }
    }
