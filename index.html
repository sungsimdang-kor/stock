<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 스터디 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #f4f6f8; --card: #ffffff; --pri: #333333; --brd: #e0e0e0; --profit: #ff4d4f; --loss: #1890ff; }

        html { height: 100%; }
        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            margin: 0; padding: 0; color: #333;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px;
            padding-bottom: 60px;
            box-sizing: border-box;
        }

        .top-info-bar { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 10px; gap: 15px; }
        .exchange-info { font-size: 12px; color: #666; font-weight: bold; }
        .refresh-btn { background: #e0e0e0; border: none; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; font-weight: bold; color: #333; transition: 0.2s; }
        .refresh-btn:hover { background: #ccc; }

        .tabs {
            display: flex;
            border-bottom: 2px solid var(--brd);
            margin-bottom: 20px;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab-btn { background: none; border: none; padding: 12px 20px; font-size: 16px; cursor: pointer; color: #666; font-weight: bold; flex-shrink: 0; }
        .tab-btn.active { color: var(--pri); border-bottom: 3px solid var(--pri); margin-bottom: -2px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card h3 { margin-top: 0; border-bottom: 1px solid var(--brd); padding-bottom: 10px; font-size: 18px; }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--brd); padding-bottom: 10px; margin-bottom: 15px; }
        .card-header h3 { border: none; padding: 0; margin: 0; }
        .realized-badge { background: #fff3cd; color: #856404; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; border: 1px solid #ffeeba; }

        .idx-wrap { background: #1a1a1a; padding: 25px; border-radius: 12px; margin-bottom: 20px; color: white; }
        .idx-wrap h3 { border-color: #333; color: #eee; text-align: center; font-size: 15px; margin-bottom: 20px; font-weight: bold; }
        .idx-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .idx-item { text-align: center; padding: 10px; border-right: 1px solid #333; display: flex; flex-direction: column; justify-content: center; }
        .idx-item:last-child { border-right: none; }
        .idx-item .val { font-size: 20px; font-weight: 800; margin-bottom: 4px; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #fff; }
        .idx-item .pct { font-size: 13px; font-weight: bold; }
        .idx-item .key { font-size: 13px; color: #b0b0b0; font-weight: 500; }
        .idx-loading { color: #aaa; font-size: 14px; text-align: center; padding: 20px 0; }

        .metrics { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .m-box { flex: 1; min-width: 200px; background: var(--card); padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #ccc; }
        .m-box.gold { border-left-color: #ffd700; }
        .m-box.red  { border-left-color: var(--profit); }
        .m-box.blue { border-left-color: var(--loss); }
        .m-box h4 { margin: 0 0 10px 0; font-size: 13px; color: #666; }
        .m-box p { margin: 0; font-size: 22px; font-weight: bold; }

        .tbl-wrap { width: 100%; overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; touch-action: pan-x; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th, td { padding: 12px 10px; border-bottom: 1px solid var(--brd); text-align: right; font-size: 14px; white-space: nowrap; }
        th { background: #f9fafc; color: #555; font-size: 13px; }
        th:first-child, td:first-child { text-align: left; }
        
        .price-up { animation: flash-up 1s ease-out; }
        .price-down { animation: flash-down 1s ease-out; }
        @keyframes flash-up { 0% { background-color: rgba(255, 77, 79, 0.2); } 100% { background-color: transparent; } }
        @keyframes flash-down { 0% { background-color: rgba(24, 144, 255, 0.2); } 100% { background-color: transparent; } }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; align-items: end; }
        .f-grp { display: flex; flex-direction: column; font-size: 12px; }
        .f-grp label { margin-bottom: 4px; color: #555; }
        .f-grp input, .f-grp select { padding: 8px; border: 1px solid var(--brd); border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        input[disabled], select[disabled] { background-color: #eaecf0; cursor: not-allowed; color: #555; font-weight: bold; border: 1px solid #ccc; }

        .btn-grp { display: flex; gap: 8px; }
        button { cursor: pointer; font-weight: bold; transition: 0.2s; border: none; border-radius: 6px; }
        .p-btn { flex: 1; padding: 10px; background: var(--pri); color: white; }
        .c-btn { flex: 1; padding: 10px; background: #6c757d; color: white; display: none; }

        .a-btn { padding: 6px 10px; font-size: 12px; margin-left: 4px; color: white; border-radius: 4px; }
        .edit-btn { background: #f1c40f; color: #333; }
        .del-btn  { background: #e74c3c; }

        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .chart { height: 250px; width: 100%; margin: 0 auto; }

        .profit { color: var(--profit); font-weight: bold; }
        .loss   { color: var(--loss);   font-weight: bold; }

        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; font-weight: bold; flex-direction: column; gap: 15px; }
        .spin { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--pri); border-radius: 50%; animation: sp 1s linear infinite; }
        @keyframes sp { 100% { transform: rotate(360deg); } }

        #del-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; justify-content: center; align-items: center; }
        #del-modal.open { display: flex; }
        .del-modal-box { background: white; border-radius: 16px; padding: 30px 24px 20px; max-width: 320px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .del-modal-box .icon { font-size: 40px; margin-bottom: 12px; }
        .del-modal-box h4 { margin: 0 0 8px; font-size: 17px; }
        .del-modal-box p  { margin: 0 0 24px; font-size: 14px; color: #666; }
        .del-modal-btns { display: flex; gap: 10px; }
        .del-modal-btns button { flex: 1; padding: 12px; border-radius: 8px; font-size: 15px; }
        #del-confirm-btn { background: #e74c3c; color: white; }
        #del-cancel-btn  { background: #f0f0f0; color: #333; }

        @media (max-width: 600px) {
            .container { padding: 10px; }
            .card { padding: 14px; }
            .idx-grid { grid-template-columns: repeat(2, 1fr); }
            .idx-item { border-right: none; border-bottom: 1px solid #333; }
            .idx-item:nth-child(odd) { border-right: 1px solid #333; }
            .idx-item:last-child { border-bottom: none; }
            .m-box { min-width: 100%; }
            .form-grid { grid-template-columns: 1fr 1fr; }
            .btn-grp { grid-column: span 2; }
            .grid-2 { grid-template-columns: 1fr; }
            .idx-item .val { font-size: 16px; }
            th, td { padding: 9px 7px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div id="loader"><div class="spin"></div><div id="loader-txt">처리 중...</div></div>

<div id="del-modal">
    <div class="del-modal-box">
        <div class="icon">🗑️</div>
        <h4>매매 기록 삭제</h4>
        <p>해당 기록을 영구적으로 삭제합니다.<br>이 작업은 되돌릴 수 없습니다.</p>
        <div class="del-modal-btns">
            <button id="del-cancel-btn" onclick="closeDelModal()">취소</button>
            <button id="del-confirm-btn">삭제</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="top-info-bar">
        <div class="exchange-info" id="exchange-rate-display">적용 환율: 로딩 중...</div>
        <button class="refresh-btn" onclick="manualRefreshPrices()">🔄 시세 갱신</button>
    </div>

    <div class="tabs" id="tab-menu">
        <button class="tab-btn active" onclick="switchTab('dashboard', this)">통합 뷰</button>
        <button class="tab-btn" onclick="switchTab('u-김태호', this)">김태호</button>
        <button class="tab-btn" onclick="switchTab('u-이용우', this)">이용우</button>
        <button class="tab-btn" onclick="switchTab('u-이형주', this)">이형주</button>
    </div>

    <div id="dashboard" class="tab-content active">
        <div class="idx-wrap">
            <h3>글로벌 마켓 실시간 지표</h3>
            <div class="idx-grid" id="market-indices">
                <div class="idx-loading">지표 불러오는 중...</div>
            </div>
        </div>
        <div class="metrics">
            <div class="m-box gold"><h4>오늘의 수익 왕</h4><p id="dash-top">-</p></div>
            <div class="m-box red"><h4>최대 수익 주식</h4><p id="dash-best" class="profit">-</p></div>
            <div class="m-box blue"><h4>최대 손해 주식</h4><p id="dash-worst" class="loss">-</p></div>
        </div>
        <div class="card">
            <h3>인원별 오버뷰 (원화 환산)</h3>
            <div class="tbl-wrap">
                <table>
                    <thead><tr><th>이름</th><th>투자 원금</th><th>현재 평가액</th><th>미실현 수익</th><th>실현 수익</th><th>총 수익률</th></tr></thead>
                    <tbody id="dash-body"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="pages-container"></div>
</div>

<script>
    const users = ['김태호', '이용우', '이형주'];
    let exKRW = 1350; 
    let previousPrices = {}; // 애니메이션 효과를 위한 이전 가격 저장소
    
    const tMap = {
        'AAPL':'Apple', 'MSFT':'Microsoft', 'TSLA':'Tesla', 'NVDA':'NVIDIA',
        'GOOGL':'Alphabet', 'AMZN':'Amazon', 'META':'Meta', 'BRK-B':'Berkshire Hathaway',
        'TSM':'TSMC', 'AVGO':'Broadcom', 'LLY':'Eli Lilly', 'JPM':'JPMorgan',
        'V':'Visa', 'UNH':'UnitedHealth', 'XOM':'Exxon Mobil', 'WMT':'Walmart',
        'JNJ':'Johnson & Johnson', 'MA':'Mastercard', 'PG':'Procter & Gamble',
        'AMD':'AMD', 'NFLX':'Netflix', 'QCOM':'Qualcomm', 'INTC':'Intel',
        'SPY':'SPY ETF', 'QQQ':'QQQ ETF', 'VOO':'VOO ETF', 'SCHD':'SCHD ETF',
        '005930':'삼성전자', '000660':'SK하이닉스', '373220':'LG에너지솔루션',
        '207940':'삼성바이오로직스', '005380':'현대차', '000270':'기아',
        '068270':'셀트리온', '005490':'POSCO홀딩스', '035420':'NAVER',
        '035720':'카카오', '003670':'포스코퓨처엠', '051910':'LG화학',
        '012330':'현대모비스', '105560':'KB금융', '028260':'삼성물산',
        '055550':'신한지주', '032830':'삼성생명', '033780':'KT&G'
    };

    const mSym = {
        'KRW=X': '원달러환율', '^IXIC': '나스닥', '^GSPC': 'S&P 500', 
        '^KS11': 'KOSPI', '^KQ11': '코스닥', '^VIX': 'VIX', 'CL=F': 'WTI 유가'
    };
    const cache = {};
    const state = { trades: {}, charts: {} };
    users.forEach(u => state.trades[u] = []);

    const firebaseConfig = {
        apiKey: "AIzaSyBjOprcJi0CotYmYDfWKoXsFtP3FTLnH-s",
        authDomain: "howooju.firebaseapp.com",
        /* 발급받은 실제 데이터베이스 URL을 입력하세요 */
        databaseURL: "https://howooju-default-rtdb.firebaseio.com",
        projectId: "howooju",
        storageBucket: "howooju.firebasestorage.app",
        messagingSenderId: "252732591437",
        appId: "1:252732591437:web:961c790c34b8269cb7bb04",
        measurementId: "G-3GEWPQ2G00"
    };

    let db = null;
    try {
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
        }
    } catch (e) { console.error("Firebase 초기화 에러:", e); }

    function toggleLd(show, txt = "처리 중...") {
        const loader = document.getElementById('loader');
        const loaderTxt = document.getElementById('loader-txt');
        if(loaderTxt) loaderTxt.innerText = txt;
        if(loader) loader.style.display = show ? 'flex' : 'none';
    }

    let pendingDelete = null;
    function openDelModal(u, id) { pendingDelete = { u, id }; document.getElementById('del-modal').classList.add('open'); }
    function closeDelModal() { pendingDelete = null; document.getElementById('del-modal').classList.remove('open'); }
    
    document.getElementById('del-confirm-btn').addEventListener('click', async function() {
        if (!pendingDelete || !db) return;
        const { id } = pendingDelete;
        closeDelModal();
        toggleLd(true, "삭제 중...");
        
        let isSuccess = false;
        const fallbackTimer = setTimeout(() => {
            if (!isSuccess) { toggleLd(false); alert("삭제 응답이 없습니다."); }
        }, 3000);

        try { 
            await db.ref(`trades/${id}`).remove(); 
            isSuccess = true;
            clearTimeout(fallbackTimer);
            toggleLd(false);
        } catch(e) { 
            isSuccess = true;
            clearTimeout(fallbackTimer);
            toggleLd(false);
            alert("삭제 실패: " + e.message); 
        }
    });

    document.getElementById('del-modal').addEventListener('click', function(e) {
        if (e.target === this) closeDelModal();
    });

    function initUI() {
        const con = document.getElementById('pages-container');
        if (!con) return;
        con.innerHTML = '';
        
        users.forEach(u => {
            const html = `
                <div id="u-${u}" class="tab-content">
                    <div class="card">
                        <div class="card-header">
                            <h3>매매 입력/수정</h3>
                            <div class="realized-badge">누적 확정 수익금: <span id="rp-${u}">0</span>원</div>
                        </div>
                        <div class="form-grid">
                            <input type="hidden" id="eid-${u}">
                            <div class="f-grp"><label>날짜</label><input type="date" id="dt-${u}"></div>
                            <div class="f-grp"><label>티커 (입력 후 바깥 클릭)</label><input type="text" id="tk-${u}" onchange="handleTk('${u}')" placeholder="AAPL, 005930"></div>
                            <div class="f-grp"><label>종목명 (자동)</label><input type="text" id="nm-${u}" disabled placeholder="자동 입력"></div>
                            <div class="f-grp"><label>유형</label><select id="ty-${u}"><option value="buy">매수</option><option value="sell">매도</option></select></div>
                            <div class="f-grp"><label>통화 (자동)</label><select id="cr-${u}" disabled><option value="USD">USD</option><option value="KRW">KRW</option></select></div>
                            <div class="f-grp"><label>가격</label><input type="number" step="0.01" id="pr-${u}"></div>
                            <div class="f-grp"><label>수량</label><input type="number" step="0.0001" id="qt-${u}"></div>
                            <div class="f-grp btn-grp" style="grid-column: span 1;">
                                <button class="p-btn" id="btn-${u}" onclick="saveTr('${u}')">저장</button>
                                <button class="c-btn" id="cbtn-${u}" onclick="cancelEd('${u}')">취소</button>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <h3>매매 일지</h3>
                        <div class="tbl-wrap">
                            <table>
                                <thead><tr><th>날짜</th><th>종목</th><th>유형</th><th>가격</th><th>수량</th><th>관리</th></tr></thead>
                                <tbody id="log-${u}"></tbody>
                            </table>
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="card">
                            <h3>현재 포트폴리오 (실시간 연동)</h3>
                            <div class="tbl-wrap">
                                <table>
                                    <thead><tr><th>종목</th><th>수량</th><th>평단가</th><th>현재가</th><th>평가액</th><th>수익률</th></tr></thead>
                                    <tbody id="port-${u}"></tbody>
                                </table>
                            </div>
                        </div>
                        <div class="card">
                            <h3>비중 차트</h3>
                            <div class="chart"><canvas id="ch-${u}"></canvas></div>
                        </div>
                    </div>
                </div>`;
            con.insertAdjacentHTML('beforeend', html);
            
            const dtInput = document.getElementById(`dt-${u}`);
            if (dtInput) dtInput.value = new Date().toISOString().substring(0, 10);
        });
    }

    function switchTab(targetId, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        const targetEl = document.getElementById(targetId);
        if (targetEl) targetEl.classList.add('active');
        if (btn) btn.classList.add('active');
    }

    window.onload = () => {
        initUI(); 
        
        toggleLd(true, "매매 데이터 로딩 중...");
        const loadTimer = setTimeout(() => { toggleLd(false); }, 3000);

        fetchExchangeRate();
        fetchIndices().then(() => renderIdx());

        if (db) {
            db.ref('trades').on('value', async (snapshot) => {
                clearTimeout(loadTimer); 
                try {
                    const data = snapshot.val() || {};
                    users.forEach(u => state.trades[u] = []);
                    
                    Object.keys(data).forEach(key => {
                        const t = data[key];
                        t.id = key;
                        if(state.trades[t.user]) state.trades[t.user].push(t);
                    });

                    updateAll();
                    toggleLd(false);

                    await fetchMissingPrices();
                    updateAll();
                } catch (err) {
                    console.error("데이터 렌더링 에러:", err);
                    toggleLd(false);
                }
            }, (error) => {
                clearTimeout(loadTimer);
                toggleLd(false);
                console.error("Firebase 읽기 에러:", error);
            });
        } else {
            clearTimeout(loadTimer);
            toggleLd(false);
        }

        // 30초마다 활성 종목의 실시간 시세 자동 갱신
        setInterval(autoRefreshPrices, 30000);
    };

    async function saveTr(u) {
        if (!db) return alert("데이터베이스에 연결되지 않았습니다.");
        
        const eid = document.getElementById(`eid-${u}`).value;
        const tk  = document.getElementById(`tk-${u}`).value.toUpperCase();
        const data = {
            user:     u,
            date:     document.getElementById(`dt-${u}`).value,
            ticker:   tk,
            name:     document.getElementById(`nm-${u}`).value || tk,
            type:     document.getElementById(`ty-${u}`).value,
            currency: document.getElementById(`cr-${u}`).value,
            price:    parseFloat(document.getElementById(`pr-${u}`).value),
            qty:      parseFloat(document.getElementById(`qt-${u}`).value)
        };
        if (!data.ticker || isNaN(data.price) || isNaN(data.qty)) return alert("입력값을 확인해 주세요.");

        toggleLd(true, "저장 중...");
        
        let isSuccess = false;
        const fallbackTimer = setTimeout(() => {
            if (!isSuccess) {
                toggleLd(false);
                alert("저장 응답이 없습니다. 네트워크 또는 DB 주소를 확인하세요.");
            }
        }, 3000);

        try {
            if (eid) await db.ref(`trades/${eid}`).update(data);
            else await db.ref('trades').push(data);
            
            isSuccess = true;
            clearTimeout(fallbackTimer);
            cancelEd(u);
            toggleLd(false);
        } catch(e) { 
            isSuccess = true;
            clearTimeout(fallbackTimer);
            toggleLd(false);
            alert("저장 실패: " + e.message); 
        }
    }

    function editTr(u, id) {
        const tr = state.trades[u].find(t => String(t.id) === String(id));
        if (!tr) return;
        document.getElementById(`eid-${u}`).value  = tr.id;
        document.getElementById(`dt-${u}`).value   = tr.date;
        document.getElementById(`tk-${u}`).value   = tr.ticker;
        document.getElementById(`nm-${u}`).value   = tr.name;
        document.getElementById(`ty-${u}`).value   = tr.type;
        document.getElementById(`cr-${u}`).value   = tr.currency;
        document.getElementById(`pr-${u}`).value   = tr.price;
        document.getElementById(`qt-${u}`).value   = tr.qty;
        document.getElementById(`btn-${u}`).innerText = "수정 완료";
        document.getElementById(`cbtn-${u}`).style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEd(u) {
        document.getElementById(`eid-${u}`).value = "";
        ['tk','nm','pr','qt'].forEach(id => {
            const el = document.getElementById(`${id}-${u}`);
            if(el) el.value = '';
        });
        document.getElementById(`dt-${u}`).value = new Date().toISOString().substring(0, 10);
        document.getElementById(`btn-${u}`).innerText = "저장";
        document.getElementById(`cbtn-${u}`).style.display = "none";
    }

    // --- API 데이터 조회 최적화 ---
    async function fetchExchangeRate() {
        try {
            const res = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
            const data = await res.json();
            if (data?.usd?.krw) {
                exKRW = data.usd.krw;
                const dEl = document.getElementById('exchange-rate-display');
                if(dEl) dEl.innerText = `적용 환율: 1 USD = ${exKRW.toLocaleString(undefined, {maximumFractionDigits: 2})} KRW`;
                updateAll(); 
            }
        } catch(e) { console.warn("환율 API 지연"); }
    }

    async function fetchIndices() {
        const symbols = Object.keys(mSym).join(',');
        try {
            const url = encodeURIComponent(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols}&_=${Date.now()}`);
            const yRes = await fetch(`https://api.allorigins.win/get?url=${url}`);
            const yData = await yRes.json();
            const parsed = JSON.parse(yData.contents);
            if (parsed.quoteResponse?.result) {
                parsed.quoteResponse.result.forEach(item => {
                    cache[item.symbol] = {
                        price:  item.regularMarketPrice || 0,
                        change: item.regularMarketChangePercent || 0,
                        name:   mSym[item.symbol] || item.shortName,
                        curr:   item.currency === 'KRW' ? 'KRW' : 'USD'
                    };
                });
            }
        } catch(e) { console.warn("지표 API 지연"); }
    }

    // 보유 중인 모든 종목의 실시간 가격 갱신 (자동/수동)
    async function autoRefreshPrices() {
        let activeTickers = new Set();
        users.forEach(u => state.trades[u].forEach(t => activeTickers.add(t.ticker)));
        if (activeTickers.size === 0) return;

        const q = Array.from(activeTickers).map(t => /^\d{6}$/.test(t) ? t+'.KS' : t).join(',');
        try {
            const url = encodeURIComponent(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${q}&_=${Date.now()}`);
            const yRes = await fetch(`https://api.allorigins.win/get?url=${url}`);
            const yData = await yRes.json();
            const parsed = JSON.parse(yData.contents);
            
            if (parsed.quoteResponse?.result) {
                let isUpdated = false;
                parsed.quoteResponse.result.forEach(item => {
                    const tk = item.symbol.replace('.KS', '');
                    if (!cache[tk]) cache[tk] = {};
                    
                    const newPrice = item.regularMarketPrice || cache[tk].price || 0;
                    if (cache[tk].price !== newPrice) {
                        previousPrices[tk] = cache[tk].price; // 변동 효과를 위해 이전 가격 저장
                        cache[tk].price = newPrice;
                        cache[tk].change = item.regularMarketChangePercent || cache[tk].change || 0;
                        isUpdated = true;
                    }
                });
                if (isUpdated) updateAll();
            }
        } catch(e) { console.warn("시세 갱신 지연"); }
    }

    async function manualRefreshPrices() {
        toggleLd(true, "최신 시세 동기화 중...");
        await fetchExchangeRate();
        await fetchIndices();
        await autoRefreshPrices();
        renderIdx();
        toggleLd(false);
    }

    async function fetchMissingPrices() {
        await autoRefreshPrices(); // 초기 누락분 조회도 동일한 갱신 로직 사용
    }

    function renderIdx() {
        const grid = document.getElementById('market-indices');
        if(!grid) return;
        const html = Object.entries(mSym).map(([sym, lbl]) => {
            const info = cache[sym];
            let priceStr = '-';
            let changeHtml = '<span class="pct" style="color:#888">로딩중...</span>';

            if (info && info.price > 0) {
                priceStr = info.price.toLocaleString(undefined, { maximumFractionDigits: 2 });
                const pct = info.change;
                const cls  = pct > 0 ? 'profit' : (pct < 0 ? 'loss' : '');
                const sign = pct > 0 ? '+' : '';
                changeHtml = `<span class="pct ${cls}">(${sign}${pct.toFixed(2)}%)</span>`;
            }
            return `<div class="idx-item"><div class="val">${priceStr} ${changeHtml}</div><div class="key">${lbl}</div></div>`;
        }).join('');
        grid.innerHTML = html;
    }

    async function getStk(tk) {
        if (!tk) return null;
        if (cache[tk] && cache[tk].price > 0) return cache[tk];
        let qTk = /^\d{6}$/.test(tk) ? tk+'.KS' : tk;
        try {
            const url = encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${qTk}?_=${Date.now()}`);
            const res  = await fetch(`https://api.allorigins.win/get?url=${url}`);
            const data = await res.json();
            const meta = JSON.parse(data.contents).chart.result[0].meta;
            const price = meta.regularMarketPrice || 0;
            const prev  = meta.chartPreviousClose || price;
            const change = prev > 0 ? ((price - prev) / prev) * 100 : 0;
            const info = { price, change, name: meta.shortName||meta.longName||tMap[tk]||tk, curr: meta.currency==='KRW'?'KRW':'USD' };
            cache[tk] = info;
            return info;
        } catch(e) {
            return { price:0, change:0, name:tMap[tk]||tk, curr:/^\d{6}$/.test(tk)?'KRW':'USD' };
        }
    }

    async function handleTk(u) {
        const tkIn = document.getElementById(`tk-${u}`);
        const nmIn = document.getElementById(`nm-${u}`);
        const prIn = document.getElementById(`pr-${u}`);
        const crSel = document.getElementById(`cr-${u}`);

        const tk = tkIn.value.trim().toUpperCase();
        if (!tk) { nmIn.value = ''; return; }

        tkIn.value = tk;
        const isKorean = /^\d{6}$/.test(tk);
        const instantName = tMap[tk] || (cache[tk] ? cache[tk].name : "");
        
        crSel.value = isKorean ? 'KRW' : 'USD';
        
        if (instantName) {
            nmIn.value = instantName;
        } else {
            nmIn.value = "";
            nmIn.placeholder = "API 검색 중...";
        }

        getStk(tk).then(info => {
            if (!nmIn.value) {
                if (info.name && info.name !== tk) nmIn.value = info.name;
                else nmIn.placeholder = "직접 입력";
            }
            if (info.price > 0 && !prIn.value) prIn.value = info.price;
        }).catch(() => {
            if (!nmIn.value) nmIn.placeholder = "직접 입력";
        });
    }

    // 화면 갱신 메인 함수
    function updateAll() {
        let stats = [], hlds = [];

        for (const u of users) {
            let port = {}, real = 0, tInv = 0, tVal = 0, cLbl = [], cDat = [];

            state.trades[u].sort((a,b) => new Date(a.date)-new Date(b.date)).forEach(t => {
                if (!port[t.ticker]) port[t.ticker] = { n: t.name, q: 0, c: 0, cr: t.currency };
                let p = port[t.ticker];
                if (t.type === 'buy') {
                    const totalQty = p.q + t.qty;
                    p.c = totalQty > 0 ? (p.q*p.c + t.qty*t.price) / totalQty : 0;
                    p.q += t.qty;
                } else {
                    real += (t.price - p.c) * t.qty * (t.currency==='USD' ? exKRW : 1);
                    p.q  -= t.qty;
                }
            });

            const rpSpan = document.getElementById(`rp-${u}`);
            if(rpSpan) {
                rpSpan.innerText = real.toLocaleString('ko-KR', {maximumFractionDigits: 0});
                rpSpan.className = real > 0 ? 'profit' : (real < 0 ? 'loss' : '');
            }

            let ptHtml = '';
            for (const [tk, p] of Object.entries(port)) {
                if (p.q <= 0) continue;
                const info  = cache[tk] || { price: p.c, name: p.n };
                const curPr = info.price > 0 ? info.price : p.c;
                const xr    = p.cr === 'USD' ? exKRW : 1;

                const iKw = p.q * p.c * xr;
                const vKw = p.q * curPr * xr;
                tInv += iKw; tVal += vKw;

                const ret  = iKw > 0 ? ((vKw - iKw)/iKw)*100 : 0;
                const sym  = p.cr === 'USD' ? '$' : '₩';
                const cls  = ret > 0 ? 'profit' : (ret < 0 ? 'loss' : '');
                const sign = ret > 0 ? '+' : '';
                const fn   = info.name || p.n;

                // 시세 변동 애니메이션 클래스 판별
                let flashClass = '';
                if (previousPrices[tk]) {
                    if (curPr > previousPrices[tk]) flashClass = 'price-up';
                    else if (curPr < previousPrices[tk]) flashClass = 'price-down';
                }

                ptHtml += `<tr class="${flashClass}">
                    <td>${fn}<br><small style="color:#888">${tk}</small></td>
                    <td>${p.q.toLocaleString(undefined,{maximumFractionDigits:4})}</td>
                    <td>${sym}${p.c.toLocaleString(undefined,{maximumFractionDigits:2})}</td>
                    <td>${sym}${curPr.toLocaleString(undefined,{maximumFractionDigits:2})}</td>
                    <td>₩${vKw.toLocaleString('ko-KR',{maximumFractionDigits:0})}</td>
                    <td class="${cls}">${sign}${ret.toFixed(2)}%</td>
                </tr>`;
                cLbl.push(fn); cDat.push(vKw); hlds.push({ u, n: fn, r: ret });
            }

            const portTbody = document.getElementById(`port-${u}`);
            if(portTbody) portTbody.innerHTML = ptHtml || '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:20px">종목 없음</td></tr>';

            const logArr = [...state.trades[u]].sort((a,b) => new Date(b.date)-new Date(a.date));
            const logTbody = document.getElementById(`log-${u}`);
            if(logTbody) {
                logTbody.innerHTML = logArr.map(t => {
                    const sym      = t.currency === 'USD' ? '$' : '₩';
                    const typeCls  = t.type === 'buy' ? 'loss' : 'profit';
                    const typeName = t.type === 'buy' ? '매수' : '매도';
                    return `<tr>
                        <td>${t.date}</td>
                        <td>${t.name}</td>
                        <td class="${typeCls}">${typeName}</td>
                        <td>${sym}${t.price.toLocaleString(undefined,{maximumFractionDigits:2})}</td>
                        <td>${t.qty}</td>
                        <td>
                            <button class="a-btn edit-btn" data-u="${u}" data-id="${t.id}" onclick="editTr(this.dataset.u, this.dataset.id)">수정</button>
                            <button class="a-btn del-btn"  data-u="${u}" data-id="${t.id}" onclick="openDelModal(this.dataset.u, this.dataset.id)">삭제</button>
                        </td>
                    </tr>`;
                }).join('') || '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:20px">내역 없음</td></tr>';
            }

            const ctxEl = document.getElementById(`ch-${u}`);
            if(ctxEl && typeof Chart !== 'undefined') {
                if (state.charts[u]) state.charts[u].destroy();
                state.charts[u] = new Chart(ctxEl.getContext('2d'), {
                    type: 'doughnut',
                    data: { labels: cLbl, datasets: [{ data: cDat, backgroundColor: ['#4e79a7','#f28e2c','#e15759','#76b7b2','#59a14f','#edc949'], borderWidth: 0 }] },
                    options: { maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12 } } } }
                });
            }

            const ur = tVal - tInv;
            const rp = tInv > 0 ? (ur/tInv)*100 : 0;
            stats.push({ u, i: tInv, v: tVal, ur, r: real, rp });
        }

        const dashBody = document.getElementById('dash-body');
        if(dashBody) {
            dashBody.innerHTML = stats.map(s => {
                const urCls = s.ur > 0 ? 'profit' : (s.ur < 0 ? 'loss' : '');
                const rCls  = s.r  > 0 ? 'profit' : (s.r  < 0 ? 'loss' : '');
                const rpCls = s.rp > 0 ? 'profit' : (s.rp < 0 ? 'loss' : '');
                return `<tr>
                    <td><strong>${s.u}</strong></td>
                    <td>₩${s.i.toLocaleString('ko-KR',{maximumFractionDigits:0})}</td>
                    <td>₩${s.v.toLocaleString('ko-KR',{maximumFractionDigits:0})}</td>
                    <td class="${urCls}">₩${s.ur.toLocaleString('ko-KR',{maximumFractionDigits:0})}</td>
                    <td class="${rCls}">₩${s.r.toLocaleString('ko-KR',{maximumFractionDigits:0})}</td>
                    <td class="${rpCls}">${s.rp>0?'+':''}${s.rp.toFixed(2)}%</td>
                </tr>`;
            }).join('');
        }

        const win = [...stats].sort((a,b) => b.rp - a.rp)[0];
        const dashTop = document.getElementById('dash-top');
        if(dashTop) dashTop.innerText = win && win.i > 0 ? `${win.u} (${win.rp>0?'+':''}${win.rp.toFixed(2)}%)` : '-';

        const dashBest = document.getElementById('dash-best');
        const dashWorst = document.getElementById('dash-worst');
        if (hlds.length > 0) {
            const b = hlds.reduce((p,c) => p.r > c.r ? p : c);
            const w = hlds.reduce((p,c) => p.r < c.r ? p : c);
            if(dashBest) dashBest.innerText  = `${b.n} (+${b.r.toFixed(2)}%)`;
            if(dashWorst) dashWorst.innerText = `${w.n} (${w.r.toFixed(2)}%)`;
        } else {
            if(dashBest) dashBest.innerText  = '-';
            if(dashWorst) dashWorst.innerText = '-';
        }
        
        // 시세 변동 기록 초기화 (애니메이션 1회용)
        previousPrices = {};
    }
</script>
