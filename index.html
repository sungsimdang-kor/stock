<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 스터디 포트폴리오 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --primary-color: #333;
            --bg-color: #f4f7f6;
            --box-bg: #fff;
            --profit-color: #e22926;
            --loss-color: #2679ed;
            --border-color: #e0e0e0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--primary-color); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #eaeaea; cursor: pointer; border-radius: 5px 5px 0 0; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--primary-color); color: #fff; }
        .view { display: none; }
        .view.active { display: block; }
        .card { background: var(--box-bg); padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .form-group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .form-group input, .form-group select, .form-group button { padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 4px; }
        .form-group button { background: var(--primary-color); color: #fff; cursor: pointer; border: none; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: center; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); font-size: 0.95rem; }
        th { background: #f9f9f9; font-weight: 600; }
        .profit { color: var(--profit-color); font-weight: bold; }
        .loss { color: var(--loss-color); font-weight: bold; }
        .neutral { color: var(--primary-color); }
        h2 { margin-bottom: 15px; font-size: 1.2rem; }
        .stat-box { text-align: center; padding: 20px; background: #fafafa; border-radius: 8px; border: 1px solid var(--border-color); }
        .stat-box h3 { font-size: 0.9rem; color: #666; margin-bottom: 5px; }
        .stat-box .value { font-size: 1.5rem; font-weight: bold; }
        .realized-profit-header { display: flex; justify-content: space-between; align-items: center; }
        .realized-badge { background: #fff3cd; color: #856404; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 1.1rem; border: 1px solid #ffeeba; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        .exchange-info { font-size: 0.85rem; color: #666; text-align: right; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="exchange-info" id="exchange-rate-display">실시간 환율 로딩 중...</div>

    <div class="tabs" id="tabs">
        <button class="tab-btn active" data-target="dashboard">통합 뷰</button>
        <button class="tab-btn" data-target="person" data-name="김태호">김태호</button>
        <button class="tab-btn" data-target="person" data-name="이용우">이용우</button>
        <button class="tab-btn" data-target="person" data-name="이형주">이형주</button>
    </div>

    <div id="dashboard" class="view active">
        <div class="grid-3 card">
            <div class="stat-box">
                <h3>👑 오늘의 수익 왕 (총 수익률)</h3>
                <div class="value" id="dash-king">-</div>
            </div>
            <div class="stat-box">
                <h3>🚀 최대 수익 주식</h3>
                <div class="value profit" id="dash-best-stock">-</div>
            </div>
            <div class="stat-box">
                <h3>📉 최대 손해 주식</h3>
                <div class="value loss" id="dash-worst-stock">-</div>
            </div>
        </div>

        <div class="card" style="overflow-x: auto;">
            <h2>인원별 오버뷰 (원화 환산 기준)</h2>
            <table>
                <thead>
                    <tr>
                        <th>이름</th>
                        <th>총 투자 원금</th>
                        <th>총 평가액</th>
                        <th>총 평가 수익금</th>
                        <th>총 확정 수익금</th>
                        <th>합산 총 수익금</th>
                        <th>총 수익률</th>
                    </tr>
                </thead>
                <tbody id="dash-overview-tbody"></tbody>
            </table>
        </div>
    </div>

    <div id="person" class="view">
        <div class="card realized-profit-header">
            <h2 id="person-title">개인 페이지</h2>
            <div class="realized-badge">누적 확정 수익금: <span id="person-realized-profit">0</span>원</div>
        </div>

        <div class="card">
            <h2>매매 입력</h2>
            <form id="trade-form" class="form-group">
                <input type="date" id="t-date" required>
                <input type="text" id="t-ticker" placeholder="종목코드(티커)" required style="width: 120px;">
                <input type="text" id="t-name" placeholder="종목명" required style="width: 150px;">
                <select id="t-type">
                    <option value="buy">매수</option>
                    <option value="sell">매도</option>
                </select>
                <select id="t-currency">
                    <option value="KRW">원화 (KRW)</option>
                    <option value="USD">달러 (USD)</option>
                </select>
                <input type="number" id="t-price" placeholder="단가" step="any" required style="width: 120px;">
                <input type="number" id="t-qty" placeholder="수량" step="any" required style="width: 100px;">
                <button type="submit" id="submit-btn">추가</button>
            </form>
        </div>

        <div class="grid-2">
            <div class="card">
                <h2>포트폴리오 비중 (원화 가치 기준)</h2>
                <div class="chart-container">
                    <canvas id="portfolioChart"></canvas>
                </div>
            </div>
            <div class="card" style="overflow-x: auto;">
                <h2>현재 포트폴리오</h2>
                <table>
                    <thead>
                        <tr>
                            <th>종목명</th>
                            <th>수량</th>
                            <th>평단가</th>
                            <th>현재가</th>
                            <th>평가액</th>
                            <th>수익률</th>
                        </tr>
                    </thead>
                    <tbody id="portfolio-tbody"></tbody>
                </table>
            </div>
        </div>

        <div class="card" style="overflow-x: auto;">
            <h2>매매 일지</h2>
            <table>
                <thead>
                    <tr>
                        <th>날짜</th>
                        <th>종목명(티커)</th>
                        <th>유형</th>
                        <th>통화</th>
                        <th>단가</th>
                        <th>수량</th>
                        <th>총액</th>
                    </tr>
                </thead>
                <tbody id="trade-history-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBjOprcJi0CotYmYDfWKoXsFtP3FTLnH-s",
    authDomain: "howooju.firebaseapp.com",
    databaseURL: "https://howooju-default-rtdb.firebaseio.com",
    projectId: "howooju",
    storageBucket: "howooju.firebasestorage.app",
    messagingSenderId: "252732591437",
    appId: "1:252732591437:web:961c790c34b8269cb7bb04",
    measurementId: "G-3GEWPQ2G00"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const state = {
    users: {
        '김태호': { trades: [] },
        '이용우': { trades: [] },
        '이형주': { trades: [] }
    },
    currentPrices: {},
    exchangeRateKRW: 1350, 
    activeTab: 'dashboard',
    activePerson: ''
};

let chartInstance = null;

const tickerDictionary = {
    "AAPL": "애플", "TSLA": "테슬라", "MSFT": "마이크로소프트", "GOOGL": "구글", 
    "AMZN": "아마존", "NVDA": "엔비디아", "META": "메타", "SPY": "SPY ETF", "QQQ": "QQQ ETF",
    "005930": "삼성전자", "000660": "SK하이닉스", "373220": "LG에너지솔루션", 
    "207940": "삼성바이오로직스", "005380": "현대차", "035420": "NAVER", "035720": "카카오"
};

async function fetchExchangeRate() {
    try {
        const response = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
        const data = await response.json();
        if(data && data.usd && data.usd.krw) {
            state.exchangeRateKRW = data.usd.krw;
            document.getElementById('exchange-rate-display').textContent = `적용 환율: 1 USD = ${state.exchangeRateKRW.toLocaleString(undefined, {maximumFractionDigits: 2})} KRW`;
        }
    } catch (error) {
        document.getElementById('exchange-rate-display').textContent = `적용 환율: 1 USD = ${state.exchangeRateKRW} KRW (기본값)`;
    }
}

async function fetchCurrentPrice(ticker, currency, avgPrice) {
    if (state.currentPrices[ticker]) return state.currentPrices[ticker];
    const variation = (Math.random() * 0.3) - 0.1; 
    const mockPrice = avgPrice * (1 + variation);
    state.currentPrices[ticker] = mockPrice;
    return mockPrice;
}

function calculatePortfolio(userName) {
    const trades = state.users[userName].trades.sort((a, b) => new Date(a.date) - new Date(b.date));
    let holdings = {};
    let realizedProfitKRW = 0;

    trades.forEach(t => {
        if (!holdings[t.ticker]) holdings[t.ticker] = { name: t.name, qty: 0, avgPrice: 0, currency: t.currency };
        let h = holdings[t.ticker];

        if (t.type === 'buy') {
            const totalCost = (h.qty * h.avgPrice) + (t.qty * t.price);
            h.qty += t.qty;
            h.avgPrice = totalCost / h.qty;
        } else if (t.type === 'sell') {
            let profit = (t.price - h.avgPrice) * t.qty;
            if (t.currency === 'USD') profit *= state.exchangeRateKRW; 
            realizedProfitKRW += profit;
            h.qty -= t.qty;
        }
    });

    for (let ticker in holdings) {
        if (holdings[ticker].qty <= 0) delete holdings[ticker];
    }
    return { holdings, realizedProfitKRW };
}

async function getPortfolioWithPrices(userName) {
    const { holdings, realizedProfitKRW } = calculatePortfolio(userName);
    let totalPrincipalKRW = 0;
    let totalCurrentValueKRW = 0;
    const items = [];

    for (let ticker in holdings) {
        const h = holdings[ticker];
        const currentPrice = await fetchCurrentPrice(ticker, h.currency, h.avgPrice);
        
        const principal = h.qty * h.avgPrice;
        const currentValue = h.qty * currentPrice;
        const returnRate = ((currentPrice - h.avgPrice) / h.avgPrice) * 100;
        
        let principalInKRW = principal;
        let currentValueInKRW = currentValue;

        if (h.currency === 'USD') {
            principalInKRW *= state.exchangeRateKRW;
            currentValueInKRW *= state.exchangeRateKRW;
        }

        totalPrincipalKRW += principalInKRW;
        totalCurrentValueKRW += currentValueInKRW;

        items.push({ 
            ticker, name: h.name, qty: h.qty, 
            avgPrice: h.avgPrice, currentPrice, currentValue, 
            returnRate, currency: h.currency,
            currentValueKRW: currentValueInKRW 
        });
    }

    return { items, realizedProfitKRW, totalPrincipalKRW, totalCurrentValueKRW };
}

const formatMoney = (num, currency) => {
    const isUSD = currency === 'USD';
    const symbol = isUSD ? '$' : '₩';
    return symbol + num.toLocaleString(undefined, {
        minimumFractionDigits: isUSD ? 2 : 0, 
        maximumFractionDigits: isUSD ? 2 : 0
    });
};
const formatPercent = (num) => num.toFixed(2) + '%';
const getColorClass = (num) => num > 0 ? 'profit' : (num < 0 ? 'loss' : 'neutral');

async function renderPersonView() {
    const userName = state.activePerson;
    document.getElementById('person-title').textContent = `${userName}의 포트폴리오`;
    const portData = await getPortfolioWithPrices(userName);
    
    const profitEl = document.getElementById('person-realized-profit');
    profitEl.textContent = Math.round(portData.realizedProfitKRW).toLocaleString();
    profitEl.className = getColorClass(portData.realizedProfitKRW);

    const pTbody = document.getElementById('portfolio-tbody');
    pTbody.innerHTML = '';
    const chartLabels = [];
    const chartData = [];

    portData.items.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${item.name}</td>
            <td>${item.qty.toLocaleString()}</td>
            <td>${formatMoney(item.avgPrice, item.currency)}</td>
            <td>${formatMoney(item.currentPrice, item.currency)}</td>
            <td>${formatMoney(item.currentValue, item.currency)}</td>
            <td class="${getColorClass(item.returnRate)}">${formatPercent(item.returnRate)}</td>
        `;
        pTbody.appendChild(tr);
        chartLabels.push(item.name);
        chartData.push(item.currentValueKRW); 
    });

    if (portData.items.length === 0) pTbody.innerHTML = `<tr><td colspan="6">보유 중인 주식이 없습니다.</td></tr>`;

    const tTbody = document.getElementById('trade-history-tbody');
    tTbody.innerHTML = '';
    const sortedTrades = [...state.users[userName].trades].sort((a, b) => new Date(b.date) - new Date(a.date));
    sortedTrades.forEach(t => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${t.date}</td>
            <td>${t.name}(${t.ticker})</td>
            <td class="${t.type==='buy'?'profit':'loss'}">${t.type === 'buy' ? '매수' : '매도'}</td>
            <td>${t.currency}</td>
            <td>${formatMoney(t.price, t.currency)}</td>
            <td>${t.qty.toLocaleString()}</td>
            <td>${formatMoney(t.price * t.qty, t.currency)}</td>
        `;
        tTbody.appendChild(tr);
    });

    renderChart(chartLabels, chartData);
}

function renderChart(labels, data) {
    const ctx = document.getElementById('portfolioChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    
    chartInstance = new Chart(ctx, {
        type: 'pie',
        data: { labels: labels, datasets: [{ data: data, backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40'] }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
    });
}

async function renderDashboard() {
    const tbody = document.getElementById('dash-overview-tbody');
    tbody.innerHTML = '';

    let userStats = [];
    let allStocks = [];

    for (let user of Object.keys(state.users)) {
        const portData = await getPortfolioWithPrices(user);
        
        const totalReturnRate = portData.totalPrincipalKRW > 0 
            ? ((portData.totalCurrentValueKRW - portData.totalPrincipalKRW) / portData.totalPrincipalKRW) * 100 
            : 0;
        const unrealizedProfitKRW = portData.totalCurrentValueKRW - portData.totalPrincipalKRW;
        const totalProfitKRW = unrealizedProfitKRW + portData.realizedProfitKRW;

        userStats.push({ 
            name: user, principal: portData.totalPrincipalKRW, value: portData.totalCurrentValueKRW, 
            unrealized: unrealizedProfitKRW, realized: portData.realizedProfitKRW, totalProfit: totalProfitKRW, returnRate: totalReturnRate 
        });

        portData.items.forEach(item => { allStocks.push({ name: item.name, ticker: item.ticker, returnRate: item.returnRate, owner: user }); });
    }

    userStats.forEach(stat => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><strong>${stat.name}</strong></td>
            <td>${formatMoney(stat.principal, 'KRW')}</td>
            <td>${formatMoney(stat.value, 'KRW')}</td>
            <td class="${getColorClass(stat.unrealized)}">${formatMoney(stat.unrealized, 'KRW')}</td>
            <td class="${getColorClass(stat.realized)}">${formatMoney(stat.realized, 'KRW')}</td>
            <td class="${getColorClass(stat.totalProfit)}"><strong>${formatMoney(stat.totalProfit, 'KRW')}</strong></td>
            <td class="${getColorClass(stat.returnRate)}"><strong>${formatPercent(stat.returnRate)}</strong></td>
        `;
        tbody.appendChild(tr);
    });

    if (userStats.length > 0 && userStats.some(s => s.principal > 0)) {
        const king = userStats.reduce((prev, current) => (prev.returnRate > current.returnRate) ? prev : current);
        document.getElementById('dash-king').innerHTML = `<span class="${getColorClass(king.returnRate)}">${king.name} (${formatPercent(king.returnRate)})</span>`;
    } else { document.getElementById('dash-king').textContent = '-'; }

    if (allStocks.length > 0) {
        const best = allStocks.reduce((prev, current) => (prev.returnRate > current.returnRate) ? prev : current);
        const worst = allStocks.reduce((prev, current) => (prev.returnRate < current.returnRate) ? prev : current);
        document.getElementById('dash-best-stock').innerHTML = `${best.name} <br><span style="font-size:1rem">(${formatPercent(best.returnRate)})</span>`;
        document.getElementById('dash-worst-stock').innerHTML = `${worst.name} <br><span style="font-size:1rem">(${formatPercent(worst.returnRate)})</span>`;
    } else {
        document.getElementById('dash-best-stock').textContent = '-';
        document.getElementById('dash-worst-stock').textContent = '-';
    }
}

document.getElementById('tabs').addEventListener('click', (e) => {
    if (e.target.classList.contains('tab-btn')) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');

        const targetView = e.target.getAttribute('data-target');
        document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
        document.getElementById(targetView).classList.add('active');

        if (targetView === 'person') {
            state.activePerson = e.target.getAttribute('data-name');
            renderPersonView();
        } else {
            renderDashboard();
        }
    }
});

document.getElementById('t-ticker').addEventListener('input', (e) => {
    const ticker = e.target.value.toUpperCase();
    if (tickerDictionary[ticker]) {
        document.getElementById('t-name').value = tickerDictionary[ticker];
        document.getElementById('t-currency').value = /^[A-Z]+$/.test(ticker) ? 'USD' : 'KRW';
    }
});

document.getElementById('trade-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const trade = {
        user: state.activePerson,
        date: document.getElementById('t-date').value,
        ticker: document.getElementById('t-ticker').value.toUpperCase(),
        name: document.getElementById('t-name').value,
        type: document.getElementById('t-type').value,
        currency: document.getElementById('t-currency').value,
        price: parseFloat(document.getElementById('t-price').value),
        qty: parseFloat(document.getElementById('t-qty').value)
    };

    db.ref('trades').push(trade);
    
    e.target.reset();
    document.getElementById('t-date').valueAsDate = new Date();
});

db.ref('trades').on('value', async (snapshot) => {
    const data = snapshot.val();
    
    state.users = { '김태호': { trades: [] }, '이용우': { trades: [] }, '이형주': { trades: [] } };
    
    if (data) {
        Object.values(data).forEach(row => {
            if(state.users[row.user]) {
                state.users[row.user].trades.push({
                    date: row.date, ticker: row.ticker, name: row.name,
                    type: row.type, currency: row.currency, price: row.price, qty: row.qty
                });
            }
        });
    }

    if (state.activeTab === 'person') {
        await renderPersonView();
    } else {
        await renderDashboard();
    }
});

async function init() {
    document.getElementById('t-date').valueAsDate = new Date();
    await fetchExchangeRate();
}

init();
</script>

</body>
</html>
